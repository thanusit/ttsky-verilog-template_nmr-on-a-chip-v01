# Tiny Tapeout project information
project:
  title:        "NMR chip for poratable NMR system"      # Project title
  author:       "Thanusit Burinprakhon"      # Your name
  discord:      "thanusit"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A chip designed to contatin SPI-configurable CPMG pulse sequence generator, rf transmitter, quadrature demodulator, and rf reciever/ADC for NMR experiments."  # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_thanusit_nmr_cores"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
  #   - "spi_tx.v"
  #   - "quadrature_demodulator.v"
     - "pulse_sequencer.v"
     - "nmr_cores.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "start"
  ui[1]: "spi_sclk"
  ui[2]: "spi_mosi"
  ui[3]: "spi_cs_n"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "rf_pulse_A"
  uo[1]: "rf_pulse_B"
  uo[2]: "rx_gate"
  uo[3]: "status_busy"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
